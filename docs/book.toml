[book]
title = "Bock Language Documentation"
description = "Reference and tutorial for the Bock programming language"
authors = ["Bock Language Contributors"]
language = "en"
multilingual = false
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/bocklang/bock"
edit-url-template = "https://github.com/bocklang/bock/edit/main/docs/{path}"
site-url = "/docs/"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.fold]
enable = true
level = 1
