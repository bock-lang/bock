version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust

  - package-ecosystem: npm
    directory: /extensions/vscode
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    ignore:
      # @types/vscode must not exceed engines.vscode (vsce refuses to
      # package otherwise). It tracks the SUPPORTED floor, not latest —
      # bump it together with an intentional engines.vscode raise.
      - dependency-name: "@types/vscode"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
