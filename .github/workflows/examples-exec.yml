name: examples-exec

# BLOCKING gate. Builds + runs every example project under examples/ on all five
# targets (js, ts, python, rust, go) and prints a PASS/FAIL matrix to the job log
# and the run summary. It runs in STRICT mode (BOCK_EXAMPLES_REQUIRE=all): the
# audit script exits non-zero if any (example, target) pair regresses below its
# recorded baseline status (tools/examples-exec-baseline.txt), failing the PR.
#
# The baseline is currently 100/100 non-red across all five targets (20 examples ×
# 5 targets; fundamentals/guessing-game is a stub-showcase whose todo()-abort run
# is the intended, non-red outcome). The gate was verified green vs baseline
# before being flipped from informational to blocking.
#
# RATCHET DISCIPLINE: the strict ratchet can only TIGHTEN, never silently loosen —
# a required pair dropping below baseline reds the PR. When a codegen cluster lands
# that improves coverage, refresh the baseline
# (BOCK_EXAMPLES_UPDATE_BASELINE=1 tools/scripts/examples-exec-audit.sh) in the
# same PR so the new floor is recorded.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - 'website/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - 'website/**'
      - '**.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  examples-exec:
    name: examples build+run matrix (blocking)
    runs-on: ubuntu-latest
    # BLOCKING: STRICT mode (BOCK_EXAMPLES_REQUIRE=all on the audit step) reds the
    # PR on any regression vs baseline. Verified green vs baseline before flipping.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain (build bock + run rust examples)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # Node 22 strips TS types natively (node --experimental-strip-types), so the
      # ts examples run without tsx/ts-node. Also serves the js examples.
      - name: Set up Node (js + ts examples)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      # The audit's ts row gates on `tsc --noEmit` (type-check) BEFORE the
      # strip-and-run — `node --experimental-strip-types` never type-checks, so
      # without tsc a ts example would count only as a build, silently dropping
      # below its baseline `pass` and under-verifying the target. Install tsc
      # globally so the blocking gate genuinely type-checks every ts example
      # (scaffolded projects pin `typescript` as a local devDep, but the audit
      # invokes a global `tsc` and never runs `npm install`).
      - name: Install TypeScript (global tsc for the ts gate)
        run: |
          npm install -g 'typescript@5'
          tsc --version

      - name: Set up Go (go examples)
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.23'

      # Python 3.x is preinstalled on ubuntu-latest; the audit runs `python3 main.py`.

      - name: Build bock
        run: cargo build -p bock --bin bock

      - name: Run examples-exec audit (blocking, strict vs baseline)
        # STRICT mode: the script exits non-zero if any (example, target) pair
        # regresses below its recorded baseline status, failing the job.
        env:
          BOCK_EXAMPLES_REQUIRE: all
        run: ./tools/scripts/examples-exec-audit.sh
