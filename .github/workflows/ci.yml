name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - 'website/**'
      - '**.md'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - 'website/**'
      - '**.md'
      - 'CHANGELOG.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  detect:
    name: detect content
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_crates: ${{ steps.probe.outputs.has_crates }}
      has_extension: ${{ steps.probe.outputs.has_extension }}
      has_docs: ${{ steps.probe.outputs.has_docs }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: probe
        shell: bash
        run: |
          if compgen -G "compiler/crates/*/Cargo.toml" > /dev/null; then
            echo "has_crates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_crates=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f extensions/vscode/package.json ]; then
            echo "has_extension=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_extension=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f docs/src/SUMMARY.md ]; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
          fi

  fmt:
    name: rustfmt
    needs: detect
    if: needs.detect.outputs.has_crates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          shared-key: lint
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    needs: detect
    if: needs.detect.outputs.has_crates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          shared-key: lint
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }} / ${{ matrix.toolchain }})
    needs: detect
    if: needs.detect.outputs.has_crates == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          shared-key: test-${{ matrix.os }}-${{ matrix.toolchain }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo test --workspace --all-features

  doc:
    name: cargo doc
    needs: detect
    if: needs.detect.outputs.has_crates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          shared-key: doc
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo doc --workspace --no-deps --all-features

  extension:
    name: vscode extension
    needs: detect
    if: needs.detect.outputs.has_extension == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: extensions/vscode/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run compile

  docs:
    name: mdbook
    needs: detect
    if: needs.detect.outputs.has_docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2.0.0
        with:
          mdbook-version: '0.5.2'
      - run: mdbook build docs
