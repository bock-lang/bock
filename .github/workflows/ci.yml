name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - 'website/**'
      - '**.md'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - 'website/**'
      - '**.md'
      - 'CHANGELOG.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  detect:
    name: detect content
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_crates: ${{ steps.probe.outputs.has_crates }}
      has_extension: ${{ steps.probe.outputs.has_extension }}
      has_docs: ${{ steps.probe.outputs.has_docs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: probe
        shell: bash
        run: |
          if compgen -G "compiler/crates/*/Cargo.toml" > /dev/null; then
            echo "has_crates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_crates=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f extensions/vscode/package.json ]; then
            echo "has_extension=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_extension=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f docs/src/SUMMARY.md ]; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
          fi

  fmt:
    name: rustfmt
    needs: detect
    if: needs.detect.outputs.has_crates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    needs: detect
    if: needs.detect.outputs.has_crates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }} / ${{ matrix.toolchain }})
    needs: detect
    if: needs.detect.outputs.has_crates == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        shell: bash
        run: |
          # `rustfmt` is needed by the transpiled-test formatter-clean gate
          # (`rust_test_file_is_rustfmt_clean`); the certifying Linux lane sets
          # BOCK_PROJECTMODE_REQUIRE=all, which fails that gate if rustfmt is
          # absent — so install the component here (minimal profile omits it).
          rustup toolchain install ${{ matrix.toolchain }} --profile minimal --component rustfmt
          rustup default ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.toolchain }}
      # ── Project-mode transpiled-test tooling (Linux lane only) ───────────────
      # The ubuntu lane is the single *certifying* lane for §20.6.2: it provisions
      # the js/ts/python test runners + formatters so `transpiled_tests.rs`
      # RUN-verifies and formatter-gates all five targets (rust + go are already
      # on the runner). `BOCK_PROJECTMODE_REQUIRE=all` (set on the test step below)
      # turns any *absent* runner/formatter into a hard failure here — so the lane
      # genuinely certifies rather than silently skipping. macOS/Windows lanes stay
      # skip-if-absent (no install), keeping total CI time sane (one lane suffices).
      - name: Set up Node (js/ts test runner + prettier)
        if: runner.os == 'Linux'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install project-mode test + format tooling
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          # JS/TS formatter. The harness prefers the project-local Prettier (an
          # `npm install` inside each scaffolded project resolves it from the
          # generated devDependencies), so a global install is a belt-and-braces
          # fallback. The Vitest runner likewise comes from `npm install`.
          npm install -g 'prettier@3'
          prettier --version
          # Python formatter(s): pipx isolates them from the PEP-668 system env.
          pipx install black
          pipx install ruff
          black --version
          # Python test runner. The runner is ephemeral, so installing pytest into
          # the system interpreter with --break-system-packages is acceptable and
          # keeps `python3 -m pytest` (and `python -m unittest`, stdlib) on PATH.
          python3 -m pip install --break-system-packages pytest
          python3 -m pytest --version
      - name: cargo test (workspace)
        shell: bash
        env:
          # Certify all five targets on Linux; elsewhere leave run-verify/format
          # checks skip-if-absent (empty require flag).
          BOCK_PROJECTMODE_REQUIRE: ${{ runner.os == 'Linux' && 'all' || '' }}
        run: cargo test --workspace --all-features

  doc:
    name: cargo doc
    needs: detect
    if: needs.detect.outputs.has_crates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo doc --workspace --no-deps --all-features

  extension:
    name: vscode extension
    needs: detect
    if: needs.detect.outputs.has_extension == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: extensions/vscode/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run compile
      - run: npm test

  docs:
    name: mdbook
    needs: detect
    if: needs.detect.outputs.has_docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install mdBook
        env:
          MDBOOK_VERSION: '0.5.2'
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "$url" | tar -xz -C "$HOME/.local/bin" mdbook
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: mdbook build docs
