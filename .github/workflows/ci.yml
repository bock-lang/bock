name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  detect:
    name: detect content
    runs-on: ubuntu-latest
    outputs:
      has_crates: ${{ steps.probe.outputs.has_crates }}
      has_extension: ${{ steps.probe.outputs.has_extension }}
      has_docs: ${{ steps.probe.outputs.has_docs }}
    steps:
      - uses: actions/checkout@v4
      - id: probe
        shell: bash
        run: |
          if compgen -G "compiler/crates/*/Cargo.toml" > /dev/null; then
            echo "has_crates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_crates=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f extensions/vscode/package.json ]; then
            echo "has_extension=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_extension=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f docs/src/SUMMARY.md ]; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
          fi

  fmt:
    name: rustfmt
    needs: detect
    if: needs.detect.outputs.has_crates == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    needs: detect
    if: needs.detect.outputs.has_crates == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }} / ${{ matrix.toolchain }})
    needs: detect
    if: needs.detect.outputs.has_crates == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  doc:
    name: cargo doc
    needs: detect
    if: needs.detect.outputs.has_crates == 'true'
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  extension:
    name: vscode extension
    needs: detect
    if: needs.detect.outputs.has_extension == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extensions/vscode/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run compile

  docs:
    name: mdbook
    needs: detect
    if: needs.detect.outputs.has_docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - run: mdbook build docs
