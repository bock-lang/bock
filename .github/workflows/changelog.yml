name: Changelog

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  append:
    name: append PR to changelog
    # Loop guard: run only for genuinely merged PRs, and never for the
    # changelog PR itself (its head branch starts with `changelog/`) or any
    # PR authored by the github-actions bot. Without this, merging the
    # changelog PR would re-trigger this workflow forever.
    if: >-
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.head.ref, 'changelog/') &&
      github.event.pull_request.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    env:
      CHANGELOG_BRANCH: changelog/unreleased
      # Use the default workflow token — no custom secret required. `main` is
      # ruleset-protected (protect-main), so we never push to it directly:
      # we push to a dedicated branch and open/update a PR instead.
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Prepare changelog branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # Fetch the existing changelog branch if it exists.
          git fetch origin "$CHANGELOG_BRANCH":"refs/remotes/origin/$CHANGELOG_BRANCH" 2>/dev/null || true
          if git rev-parse -q --verify "refs/remotes/origin/$CHANGELOG_BRANCH" >/dev/null \
             && ! git diff --quiet "origin/main..refs/remotes/origin/$CHANGELOG_BRANCH"; then
            # A changelog PR is still open (the branch has pending, un-merged
            # entries ahead of main). Build on top of it so we accumulate the
            # new entry rather than clobbering the pending ones.
            git switch -C "$CHANGELOG_BRANCH" "refs/remotes/origin/$CHANGELOG_BRANCH"
            # Fast-forward onto the latest main if main moved underneath us, so
            # the PR stays mergeable. If that conflicts (it shouldn't, since only
            # CHANGELOG.md is touched), fail loudly instead of guessing.
            git merge --no-edit origin/main
          else
            # No open changelog PR (branch absent, or already merged into main):
            # main already contains every prior entry, so branch fresh from it.
            git switch -C "$CHANGELOG_BRANCH" origin/main
          fi

      - name: Append PR to Unreleased section
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          python3 - <<'PY'
          import os, re, pathlib
          path = pathlib.Path("CHANGELOG.md")
          text = path.read_text()
          title = os.environ["PR_TITLE"]
          number = os.environ["PR_NUMBER"]
          author = os.environ["PR_AUTHOR"]
          url = os.environ["PR_URL"]
          entry = f"- {title} ([#{number}]({url})) by @{author}\n"
          pattern = re.compile(r"(## Unreleased\s*\n)", re.MULTILINE)
          if not pattern.search(text):
              raise SystemExit("CHANGELOG.md missing '## Unreleased' section")
          # Idempotency: don't double-append the same PR if this run repeats.
          if f"([#{number}]({url}))" in text:
              print(f"PR #{number} already present in CHANGELOG.md; nothing to do.")
              raise SystemExit(0)
          new_text = pattern.sub(rf"\g<1>{entry}", text, count=1)
          path.write_text(new_text)
          PY

      - name: Commit and push changelog branch
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog change to commit; skipping."
            exit 0
          fi
          git commit -m "changelog: PR #${PR_NUMBER}"
          # The changelog branch is bot-owned and recreated from main each run,
          # so its tip changes; force-with-lease against the tracked remote ref
          # overwrites only our own history while guarding against a concurrent
          # update from another run. On the first run the remote branch does
          # not exist yet, so we do a plain (non-force) push.
          if git rev-parse -q --verify "refs/remotes/origin/$CHANGELOG_BRANCH" >/dev/null; then
            git push --force-with-lease="$CHANGELOG_BRANCH:refs/remotes/origin/$CHANGELOG_BRANCH" origin "$CHANGELOG_BRANCH"
          else
            git push origin "$CHANGELOG_BRANCH"
          fi

      - name: Open or update changelog PR
        run: |
          # Skip if the branch matches main (e.g. the entry was already merged).
          if git diff --quiet "origin/main..$CHANGELOG_BRANCH"; then
            echo "Changelog branch has no diff against main; no PR needed."
            exit 0
          fi
          existing="$(gh pr list --head "$CHANGELOG_BRANCH" --base main --state open --json number --jq '.[0].number // empty')"
          title="changelog: sync Unreleased entries"
          body=$'Automated changelog sync.\n\nThis PR accumulates merged-PR entries into the `## Unreleased` section of `CHANGELOG.md`. It is opened/updated by the Changelog workflow using the default `GITHUB_TOKEN` and respects the `protect-main` ruleset (no direct pushes to `main`).\n\nThe Orchestrator merges this like any other PR; merging it does **not** re-trigger the workflow (loop-guarded on the `changelog/` head branch and the github-actions author).'
          if [ -n "$existing" ]; then
            echo "Updating existing changelog PR #$existing"
            gh pr edit "$existing" --title "$title" --body "$body"
          else
            echo "Opening new changelog PR"
            gh pr create --base main --head "$CHANGELOG_BRANCH" --title "$title" --body "$body"
          fi
