name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  # Read-only guard: the Unreleased changelog section must be in sync with
  # git history before a release goes out. This NEVER writes the repo, uses
  # no token, and opens no PR — it regenerates into a temp file and diffs.
  # If it fails, run `tools/scripts/gen-changelog.sh` locally, commit via the
  # normal PR flow, and re-tag. `fetch-depth: 0` is required because the
  # generator walks full first-parent history (there are no release tags yet).
  verify-changelog:
    name: verify changelog is in sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check Unreleased section against git history
        run: tools/scripts/gen-changelog.sh --check

  build-binaries:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          shared-key: release-${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} --bin bock
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bock-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bock
            target/${{ matrix.target }}/release/bock.exe

  build-extension:
    name: build vsix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: extensions/vscode/package-lock.json
      - run: npm ci
      - run: npx @vscode/vsce package
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode-extension
          path: extensions/vscode/*.vsix

  publish-crates:
    name: publish to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-binaries
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          shared-key: publish
      - run: cargo publish --workspace --token ${{ secrets.CRATES_IO_TOKEN }}

  publish-extension:
    name: publish to vs code marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-extension
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vscode-extension
          path: ./vsix
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: npx @vscode/vsce publish --packagePath ./vsix/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  deploy-website:
    name: deploy website + docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2.0.0
        with:
          mdbook-version: '0.5.2'
      - run: mdbook build docs
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - run: cd website && npm ci && npm run build
      - name: Deploy
        run: echo "Deploy step — wire to host (Pages, Vercel, etc.)"

  github-release:
    name: github release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-binaries, build-extension]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./artifacts
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
