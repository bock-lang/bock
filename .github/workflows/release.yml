name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-binaries:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }} --bin bock
      - uses: actions/upload-artifact@v4
        with:
          name: bock-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bock
            target/${{ matrix.target }}/release/bock.exe

  build-extension:
    name: build vsix
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx @vscode/vsce package
      - uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: extensions/vscode/*.vsix

  publish-crates:
    name: publish to crates.io
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --workspace --token ${{ secrets.CRATES_IO_TOKEN }}

  publish-extension:
    name: publish to vs code marketplace
    runs-on: ubuntu-latest
    needs: build-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: ./vsix
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx @vscode/vsce publish --packagePath ./vsix/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  deploy-website:
    name: deploy website + docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-mdbook@v2
      - run: mdbook build docs
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd website && npm ci && npm run build
      - name: Deploy
        run: echo "Deploy step — wire to host (Pages, Vercel, etc.)"

  github-release:
    name: github release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-extension]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
