name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'website/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  detect:
    name: detect content
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_docs: ${{ steps.probe.outputs.has_docs }}
      has_website: ${{ steps.probe.outputs.has_website }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: probe
        shell: bash
        run: |
          if [ -f docs/src/SUMMARY.md ]; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f website/package.json ]; then
            echo "has_website=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_website=false" >> "$GITHUB_OUTPUT"
          fi

  build-docs:
    name: build mdbook
    needs: detect
    if: needs.detect.outputs.has_docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2.0.0
        with:
          mdbook-version: '0.5.2'
      - run: mdbook build docs
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docs-site
          path: docs/book

  build-website:
    name: build website
    needs: detect
    if: needs.detect.outputs.has_website == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - run: cd website && npm ci && npm run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: website-site
          path: website/dist

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [detect, build-docs, build-website]
    if: needs.detect.outputs.has_docs == 'true' && needs.detect.outputs.has_website == 'true'
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./out
      - name: Assemble site
        run: |
          mkdir -p site
          cp -r out/website-site/* site/
          mkdir -p site/docs
          cp -r out/docs-site/* site/docs/
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
