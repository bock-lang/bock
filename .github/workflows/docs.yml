name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'website/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  detect:
    name: detect content
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_docs: ${{ steps.probe.outputs.has_docs }}
      has_website: ${{ steps.probe.outputs.has_website }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: probe
        shell: bash
        run: |
          if [ -f docs/src/SUMMARY.md ]; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f website/package.json ]; then
            echo "has_website=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_website=false" >> "$GITHUB_OUTPUT"
          fi

  build-docs:
    name: build mdbook
    needs: detect
    if: needs.detect.outputs.has_docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install mdBook
        env:
          MDBOOK_VERSION: '0.5.2'
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "$url" | tar -xz -C "$HOME/.local/bin" mdbook
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: mdbook build docs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-site
          path: docs/book

  build-website:
    name: build website
    needs: detect
    if: needs.detect.outputs.has_website == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - run: cd website && npm ci && npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-site
          path: website/dist

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [detect, build-docs, build-website]
    if: needs.detect.outputs.has_docs == 'true' && needs.detect.outputs.has_website == 'true'
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./out
      - name: Assemble site
        run: |
          mkdir -p site
          cp -r out/website-site/* site/
          mkdir -p site/docs
          cp -r out/docs-site/* site/docs/
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
