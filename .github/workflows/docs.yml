name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'website/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  detect:
    name: detect content
    runs-on: ubuntu-latest
    outputs:
      has_docs: ${{ steps.probe.outputs.has_docs }}
      has_website: ${{ steps.probe.outputs.has_website }}
    steps:
      - uses: actions/checkout@v4
      - id: probe
        shell: bash
        run: |
          if [ -f docs/src/SUMMARY.md ]; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f website/package.json ]; then
            echo "has_website=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_website=false" >> "$GITHUB_OUTPUT"
          fi

  build-docs:
    name: build mdbook
    needs: detect
    if: needs.detect.outputs.has_docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - run: mdbook build docs
      - uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/book

  build-website:
    name: build website
    needs: detect
    if: needs.detect.outputs.has_website == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - run: cd website && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: website-site
          path: website/dist

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [detect, build-docs, build-website]
    if: needs.detect.outputs.has_docs == 'true' && needs.detect.outputs.has_website == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./out
      - name: Assemble site
        run: |
          mkdir -p site
          cp -r out/website-site/* site/
          mkdir -p site/docs
          cp -r out/docs-site/* site/docs/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
