[project]
name = "task-api"
version = "0.1.0"
requires-python = ">=3.9"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[dependency-groups]
# Test framework: pytest
dev = [
  "pytest>=8.0",
]

[tool.pytest.ini_options]
testpaths = ["."]

[tool.black]
line-length = 88
target-version = ["py39"]
